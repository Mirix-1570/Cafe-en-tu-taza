<html><head>
<meta charset="utf-8"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Inter%3Awght%40400%3B500%3B700%3B900&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900" onload="this.rel='stylesheet'" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<title>Stitch Design - Admin Login</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-[#181411] text-white selection:bg-[#d47211] selection:text-white" style='font-family: Inter, "Noto Sans", sans-serif;'>
<div class="relative min-h-screen w-full flex items-center justify-center p-4 overflow-hidden">
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center opacity-40 transform scale-105" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAXYsaETNcRzchDqbBAI3Nms0Yk4UszkTPS_c4dHhdYskELyqI-60StwB57V-2dvDO75osaHrCdMQnSfC1WD7KWQJAZuYecfTFTc_AmSxcwFqsTmNdBeKhEqNLPySxBb3TixPBCe0Ic6AUj6uMzQK3dutrFBErcUK4n0nLk7Z2rl43LQrtbDVnJyxOxLLZuCEEV5_ikhJAcK1GXKLOqdYaLNkyKhOEfFNijkYOk6MDepxiLD1w6fKV6SywK0igYvH9KqFnqrCVJ-Lg");'></div>
<div class="absolute inset-0 bg-gradient-to-br from-[#181411]/90 via-[#181411]/80 to-[#181411]/95 backdrop-blur-[2px]"></div>
</div>
<div class="relative z-10 w-full max-w-[420px] bg-[#221d18] border border-[#3a322b] rounded-2xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.5)] overflow-hidden">
<div class="h-1.5 w-full bg-gradient-to-r from-[#d47211] to-[#a3560b]"></div>
<div class="p-8 sm:p-10">
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-16 h-16 bg-[#2f2822] rounded-full flex items-center justify-center mb-5 ring-1 ring-[#3a322b] shadow-inner">
<span class="material-symbols-outlined text-[#d47211]" style="font-size: 32px;">local_cafe</span>
</div>
<h2 class="text-2xl font-bold tracking-tight text-white">Iniciar Sesión</h2>
<p class="text-[#9ca3af] text-sm mt-2">Panel de Administrador</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<div class="space-y-1.5">
<label class="block text-xs font-bold text-[#b9ab9d] uppercase tracking-wider ml-1">Correo electrónico</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[#6b5f56] group-focus-within:text-[#d47211] transition-colors" style="font-size: 20px;">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-[#181411] border border-[#393028] rounded-lg text-sm text-white placeholder-[#584f48] focus:outline-none focus:ring-2 focus:ring-[#d47211]/50 focus:border-[#d47211] transition-all duration-200 ease-in-out" placeholder="admin@coffeeapp.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-xs font-bold text-[#b9ab9d] uppercase tracking-wider ml-1">Contraseña</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[#6b5f56] group-focus-within:text-[#d47211] transition-colors" style="font-size: 20px;">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-[#181411] border border-[#393028] rounded-lg text-sm text-white placeholder-[#584f48] focus:outline-none focus:ring-2 focus:ring-[#d47211]/50 focus:border-[#d47211] transition-all duration-200 ease-in-out" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-end">
<a class="text-sm font-medium text-[#d47211] hover:text-[#ff9d42] transition-colors duration-200" href="#">
                ¿Olvidaste tu contraseña?
              </a>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-[#d47211] hover:bg-[#c0650e] text-white text-sm font-bold py-3.5 px-4 rounded-lg shadow-lg shadow-[#d47211]/20 transition-all transform active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#d47211] focus:ring-offset-[#221d18]" type="submit">
<span>Iniciar Sesión</span>
<span class="material-symbols-outlined" style="font-size: 20px;">login</span>
</button>
</form>
</div>
<div class="bg-[#1c1814] px-6 py-4 border-t border-[#2f2822] flex items-center justify-center gap-2 text-[#6b5f56]">
<span class="material-symbols-outlined" style="font-size: 16px;">verified_user</span>
<span class="text-xs font-semibold tracking-wide">Acceso Seguro</span>
</div>
</div>
</div>

</body></html>
