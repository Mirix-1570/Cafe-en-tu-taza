<html><head>
<meta charset="utf-8"/>
<link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
<link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Manrope%3Awght%40400%3B500%3B700%3B800&amp;family=Noto+Sans%3Awght%40400%3B500%3B700%3B900" onload="this.rel='stylesheet'" rel="stylesheet"/>
<title>Stitch Design</title>
<link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body>
<div class="relative flex h-auto min-h-screen w-full flex-col bg-white group/design-root overflow-x-hidden" style='font-family: Manrope, "Noto Sans", sans-serif;'>
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-b-[#f4f2f0] px-10 py-3">
<div class="flex items-center gap-4 text-[#181411]">
<div class="size-4">
<svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M24 18.4228L42 11.475V34.3663C42 34.7796 41.7457 35.1504 41.3601 35.2992L24 42V18.4228Z" fill="currentColor" fill-rule="evenodd"></path>
<path clip-rule="evenodd" d="M24 8.18819L33.4123 11.574L24 15.2071L14.5877 11.574L24 8.18819ZM9 15.8487L21 20.4805V37.6263L9 32.9945V15.8487ZM27 37.6263V20.4805L39 15.8487V32.9945L27 37.6263ZM25.354 2.29885C24.4788 1.98402 23.5212 1.98402 22.646 2.29885L4.98454 8.65208C3.7939 9.08038 3 10.2097 3 11.475V34.3663C3 36.0196 4.01719 37.5026 5.55962 38.098L22.9197 44.7987C23.6149 45.0671 24.3851 45.0671 25.0803 44.7987L42.4404 38.098C43.9828 37.5026 45 36.0196 45 34.3663V11.475C45 10.2097 44.2061 9.08038 43.0155 8.65208L25.354 2.29885Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<h2 class="text-[#181411] text-lg font-bold leading-tight tracking-[-0.015em]">BrewBuddy Admin</h2>
</div>
</header>
<div class="flex flex-1 justify-center items-center py-10 px-4">
<div class="flex flex-col w-full max-w-[480px]">
<h2 class="text-[#181411] tracking-tight text-[28px] font-bold leading-tight text-center mb-8">Create your admin account</h2>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-[#181411] text-base font-medium leading-normal" for="name">Name</label>
<input class="form-input w-full rounded-lg text-[#181411] focus:ring-2 focus:ring-[#d47211] border-none bg-[#f4f2f0] h-14 placeholder:text-[#897561] px-4 text-base font-normal leading-normal focus:outline-none transition-shadow duration-200" id="name" placeholder="Enter your name" required="" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-[#181411] text-base font-medium leading-normal" for="email">Email</label>
<input class="form-input w-full rounded-lg text-[#181411] focus:ring-2 focus:ring-[#d47211] border-none bg-[#f4f2f0] h-14 placeholder:text-[#897561] px-4 text-base font-normal leading-normal focus:outline-none transition-shadow duration-200" id="email" placeholder="Enter your email" required="" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-[#181411] text-base font-medium leading-normal" for="password">Password</label>
<input class="form-input w-full rounded-lg text-[#181411] focus:ring-2 focus:ring-[#d47211] border-none bg-[#f4f2f0] h-14 placeholder:text-[#897561] px-4 text-base font-normal leading-normal focus:outline-none transition-shadow duration-200" id="password" placeholder="Enter your password" required="" type="password"/>
</div>
<div class="pt-2">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 bg-[#d47211] hover:bg-[#b5610e] text-white text-base font-bold leading-normal tracking-[0.015em] transition-colors duration-200" type="submit">
<span class="truncate">Sign Up</span>
</button>
</div>
</form>
<p class="text-[#897561] text-sm font-normal leading-normal mt-6 text-center">Note: Your account will require approval from an existing administrator.</p>
</div>
</div>
</div>
</div>

</body></html>
